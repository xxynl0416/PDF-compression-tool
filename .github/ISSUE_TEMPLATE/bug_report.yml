name: Bug Report
description: Report reproducible bugs or regressions
labels: [bug]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to Reproduce
      description: Provide exact steps and sample files if possible.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: OS
      placeholder: Windows 11 / Ubuntu 24.04 / macOS 14

  - type: input
    id: pyver
    attributes:
      label: Python Version
      placeholder: 3.10 / 3.11

  - type: input
    id: gsver
    attributes:
      label: Ghostscript Version (optional)

  - type: textarea
    id: logs
    attributes:
      label: Logs / Screenshots
      render: shell
